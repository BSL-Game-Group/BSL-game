apiVersion: apps/v1
kind: Deployment

metadata:
  name: bsl-backend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: bsl-backend

  template:
    metadata:
      labels:
        app: bsl-backend

    spec:
      containers:
        - name: bsl-backend
          image: jvilo/bsl-backend:staging
          imagePullPolicy: Always

          ports:
            - containerPort: 3001

          env:
            - name: DB_HOST
              value: bsl-postgres-service

            - name: DB_USER
              value: bsluser

            - name: DB_PASSWORD
              value: bslpassword

            - name: DB_NAME
              value: bsldb