apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Backend
  # NOTE: the backend connects to the external managed Postgres ("possu") via the
  # bsl-backend-secret (DB_URL), which is created directly on the cluster — there is no
  # in-cluster Postgres and no secret/configmap manifest in this repo.
  - backend/manifests/imagestream.yaml
  - backend/manifests/service.yaml
  - backend/manifests/deployment.yaml
  - backend/manifests/route.yaml

  # Frontend
  - frontend/manifests/imagestream.yaml
  - frontend/manifests/service.yaml
  - frontend/manifests/deployment.yaml
  - frontend/manifests/route.yaml