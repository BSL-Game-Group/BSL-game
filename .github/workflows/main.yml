name: CI - Full Stack Test and Build

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Test (Full Stack via Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start full stack (docker compose)
        run: docker compose up -d --build

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -fs http://localhost:3001/ && exit 0
            sleep 1
          done
          echo "Backend not ready"
          docker compose logs
          exit 1

      - name: Wait for frontend
        run: |
          for i in $(seq 1 30); do
            curl -fs http://localhost:5173 && exit 0
            sleep 1
          done
          echo "Frontend not ready"
          docker compose logs
          exit 1

      - name: Install Playwright dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - name: Stop services
        if: always()
        run: docker compose down

  build-and-push:
    name: Build & Push Docker Images
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/bsl-backend:staging

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/bsl-frontend:staging