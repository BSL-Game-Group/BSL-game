name: CI - Full Stack Test and Build

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Test (Full Stack via Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------------------
      # Start full stack
      # ---------------------------
      - name: Start services
        run: docker compose up -d --build

      # ---------------------------
      # Wait for backend
      # ---------------------------
      - name: Wait for backend
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 60); do
            if curl -fs http://localhost:3001/ >/dev/null; then
              echo "Backend ready"
              exit 0
            fi
            sleep 2
          done

          echo "Backend failed"
          docker compose logs backend
          exit 1

      # ---------------------------
      # Wait for frontend
      # ---------------------------
      - name: Wait for frontend
        run: |
          echo "Waiting for frontend..."
          for i in $(seq 1 60); do
            if curl -fs http://localhost:5173/ >/dev/null; then
              echo "Frontend ready"
              exit 0
            fi
            sleep 2
          done

          echo "Frontend failed"
          docker compose logs frontend
          exit 1

      # ---------------------------
      # Always cleanup
      # ---------------------------
      - name: Stop services
        if: always()
        run: docker compose down

  build-and-push:
    name: Build & Push Docker Images
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ---------------------------
      # Backend image
      # ---------------------------
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/bsl-backend:staging

      # ---------------------------
      # Frontend image
      # ---------------------------
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/bsl-frontend:staging